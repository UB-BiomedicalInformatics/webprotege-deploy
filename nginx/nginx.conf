server {
    server_name osler.compbio.buffalo.edu;
    listen 80;
    #	listen 443 ssl default_server;
    #listen [::]:443 ssl default_server;
    #	ssl_certificate /etc/ssl/certs/osler_compbio_buffalo_edu.pem;
    #	ssl_certificate_key /etc/ssl/private/osler.compbio.buffalo.edu.key;
	sendfile on;
	client_max_body_size 40M;
	client_body_buffer_size 40M;
	proxy_send_timeout 600s;
	proxy_read_timeout 600s;
	fastcgi_send_timeout 600s;

    location / {
        proxy_pass http://webprotege-gwt-ui-server:8080/webprotege/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size   500m;
    }

    location /webprotege/ {
        proxy_pass http://webprotege-gwt-ui-server:8080/webprotege/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size   500m;
    }

    location /files/submit {
        proxy_pass http://webprotege-gwt-api-gateway:7777/files/submit;
        proxy_set_header   Host $http_host;
        client_max_body_size   500m;
    }

    location /eshexplorer/ {
      proxy_pass http://esh_explorer:8887/eshexplorer/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size   500m;
    }
    
    location /eshexplorer {
      proxy_pass http://esh_explorer:8887/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size   500m;
    }

    location /data/ {
        proxy_pass http://webprotege-gwt-api-gateway:7777/data/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size   500m;
        rewrite_log on;
    }

    location /keycloak/ {
        #proxy_pass http://172.17.0.1:8080/keycloak/;
        proxy_pass http://keycloak:8080/keycloak/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }

    location /wsapps {

        proxy_pass http://webprotege-gwt-api-gateway:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /kibana/ {
        proxy_pass http://172.17.0.1:5601;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /kibana;
    }
	location /hello_world {
    		add_header Content-Type text/plain;
    		return 200 'hello world';
	}

}

upstream websocket  {
    server webprotege-gwt-api-gateway:7777;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
